<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Engrenagem Industrial (Marrom/Terra #7A6332) -->
  <g fill="#7A6332">
    <!-- Dentes da engrenagem (12 dentes) -->
    <rect x="44" y="2" width="12" height="14" rx="2" transform="rotate(0, 50, 50)"/>
    <rect x="44" y="2" width="12" height="14" rx="2" transform="rotate(30, 50, 50)"/>
    <rect x="44" y="2" width="12" height="14" rx="2" transform="rotate(60, 50, 50)"/>
    <rect x="44" y="2" width="12" height="14" rx="2" transform="rotate(90, 50, 50)"/>
    <rect x="44" y="2" width="12" height="14" rx="2" transform="rotate(120, 50, 50)"/>
    <rect x="44" y="2" width="12" height="14" rx="2" transform="rotate(150, 50, 50)"/>
    <rect x="44" y="2" width="12" height="14" rx="2" transform="rotate(180, 50, 50)"/>
    <rect x="44" y="2" width="12" height="14" rx="2" transform="rotate(210, 50, 50)"/>
    <rect x="44" y="2" width="12" height="14" rx="2" transform="rotate(240, 50, 50)"/>
    <rect x="44" y="2" width="12" height="14" rx="2" transform="rotate(270, 50, 50)"/>
    <rect x="44" y="2" width="12" height="14" rx="2" transform="rotate(300, 50, 50)"/>
    <rect x="44" y="2" width="12" height="14" rx="2" transform="rotate(330, 50, 50)"/>
    <!-- Corpo central da engrenagem -->
    <circle cx="50" cy="50" r="28"/>
  </g>

  <!-- Anel interno da engrenagem -->
  <circle cx="50" cy="50" r="20" fill="#5C4A24"/>

  <!-- Centro com folha verde -->
  <circle cx="50" cy="50" r="16" fill="#4A6B2F"/>

  <!-- Folha estilizada (verde claro no centro) -->
  <g fill="#6B8E23" transform="translate(50, 50) scale(0.45)">
    <!-- Folha central -->
    <path d="M0,-30 C15,-15 15,10 0,30 C-15,10 -15,-15 0,-30 Z"/>
    <!-- Nervura da folha -->
    <line x1="0" y1="-25" x2="0" y2="25" stroke="#4A6B2F" stroke-width="2" fill="none"/>
    <!-- Nervuras laterais -->
    <line x1="0" y1="-10" x2="8" y2="-18" stroke="#4A6B2F" stroke-width="1.2" fill="none"/>
    <line x1="0" y1="-10" x2="-8" y2="-18" stroke="#4A6B2F" stroke-width="1.2" fill="none"/>
    <line x1="0" y1="5" x2="7" y2="-3" stroke="#4A6B2F" stroke-width="1.2" fill="none"/>
    <line x1="0" y1="5" x2="-7" y2="-3" stroke="#4A6B2F" stroke-width="1.2" fill="none"/>
  </g>
</svg>
